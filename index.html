<!DOCTYPE html>
<html>
<head>
<title>Shadowing Trainer</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f2f2f7;
  text-align: center;
  margin: 0;
}

h1 {
  font-size: 28px;
  margin-top: 30px;
}

.subtitle {
  color: #666;
  margin-bottom: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

textarea {
  width: 100%;
  height: 120px;
  font-size: 16px;
  border-radius: 12px;
  border: 1px solid #ddd;
  padding: 10px;
}

button {
  padding: 12px 24px;
  margin: 10px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #005ecb;
}

#target {
  font-size: 22px;
  margin-bottom: 15px;
}

#result {
  margin-top: 10px;
  font-size: 18px;
}

.correct { color: #2ecc71; }
.wrong { color: #e74c3c; font-weight:bold; }

#history {
  margin-top: 20px;
  text-align: left;
  max-height: 200px;
  overflow:auto;
}

.log {
  border-bottom:1px solid #eee;
  padding:8px;
  font-size:14px;
}

.guide {
  text-align: left;
  font-size: 14px;
  color: #555;
  line-height: 1.6;
}
</style>
</head>

<body>

<h1>大洋の特訓用自作アプリ</h1>
<div class="subtitle">Shadowing Trainer</div>

<div class="container">

<div class="card guide">
<b>使い方</b><br>
① 英文を貼り付ける<br>
② Startを押す<br>
③ 音声を聞いてシャドーイング<br>
④ 正しければ次へ、自信がなければ繰り返し<br>
⑤ Nextボタンでスキップも可能
</div>

<div class="card">
<textarea id="input" placeholder="Paste your English text here"></textarea>

<br>

<label>Speed: <span id="speedVal">0.8</span></label><br>
<input type="range" min="0.5" max="1.2" step="0.1" value="0.8" id="speed">

<br>
<button onclick="start()">Start</button>
<button onclick="forceNext()">Next ▶</button>
</div>

<div class="card">
<div id="target">Press Start</div>
<div id="result"></div>
</div>

<div class="card">
<b>履歴</b>
<div id="history"></div>
</div>

</div>

<script>
let chunks=[], index=0;
let recognition;

// ===== 音声（Google TTS）=====
async function speak(text){

  const API_KEY = "ここにAPIキー";

  const url = `https://texttospeech.googleapis.com/v1/text:synthesize?key=${API_KEY}`;

  const body = {
    input: { text: text },
    voice: { languageCode: "en-US", name: "en-US-Wavenet-D" },
    audioConfig: {
      audioEncoding: "MP3",
      speakingRate: parseFloat(document.getElementById("speed").value)
    }
  };

  const res = await fetch(url, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });

  const data = await res.json();

  const audio = new Audio("data:audio/mp3;base64," + data.audioContent);

  audio.onended = ()=>setTimeout(startListening,200);

  audio.play();
}

// ===== 以下は既存そのまま =====

document.getElementById("speed").oninput = function() {
  document.getElementById("speedVal").innerText = this.value;
};

function splitText(text){
  return text.replace(/\n/g," ").replace(/,/g,".")
    .split(/(?<=[.!?])/).filter(s=>s.trim());
}

function initRecognition(){
  recognition = new webkitSpeechRecognition();
  recognition.lang="en-US";
  recognition.interimResults=true;

  recognition.onresult = function(e){
    let interim="", final="";
    for(let i=0;i<e.results.length;i++){
      if(e.results[i].isFinal){
        final += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }

    document.getElementById("result").innerHTML="<b>You:</b> "+interim;

    if(final){
      document.getElementById("result").innerHTML="<b>You:</b> "+final;
      addHistory(final);
      check(final);
    }
  };

  recognition.onerror = ()=>startListening();
}

function startListening(){
  try{ recognition.start(); }catch(e){}
}

function start(){
  chunks=splitText(document.getElementById("input").value);
  index=0;
  initRecognition();
  next();
}

function next(){
  if(index>=chunks.length){
    document.getElementById("target").innerText="Finished!";
    return;
  }
  document.getElementById("target").innerText=chunks[index];
  document.getElementById("result").innerHTML="🎤 Speak now...";
  speak(chunks[index]);
}

function forceNext(){
  index++;
  next();
}

function addHistory(text){
  let div=document.createElement("div");
  div.className="log";
  div.innerText=text;
  document.getElementById("history").prepend(div);
}

function check(user){
  let target=chunks[index].toLowerCase().split(" ");
  let input=user.toLowerCase().split(" ");

  let html="", match=0;

  target.forEach(word=>{
    if(input.includes(word)){
      html+="<span class='correct'>"+word+" </span>";
      match++;
    }else{
      html+="<span class='wrong'>"+word+" </span>";
    }
  });

  document.getElementById("target").innerHTML=html;

  let score=match/target.length;

  if(score>0.4){
    index++;
    setTimeout(next,800);
  }else{
    speak("Again");
  }
}
</script>

</body>
</html>
