<!DOCTYPE html>
<html>
<head>
<title>Shadowing Trainer</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f2f2f7;
  text-align: center;
  margin: 0;
}

h1 {
  font-size: 28px;
  margin-top: 30px;
}

.subtitle {
  color: #666;
  margin-bottom: 10px;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px 0;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: left;
}

textarea {
  width: 100%;
  height: 120px;
  font-size: 16px;
  border-radius: 12px;
  border: 1px solid #ddd;
  padding: 10px;
}

button {
  padding: 12px 20px;
  margin: 8px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #005ecb;
}

#target {
  font-size: 22px;
  margin-bottom: 10px;
}

#result {
  font-size: 18px;
}

.correct { color: #2ecc71; }
.wrong { color: #e74c3c; font-weight: bold; }

.guide {
  font-size: 14px;
  color: #444;
  line-height: 1.6;
}
</style>
</head>

<body>

<h1>大洋の特訓用自作アプリ</h1>
<div class="subtitle">Shadowing Trainer</div>

<div class="container">

<div class="card guide">
<b>使い方</b><br>
1. 英文を貼り付ける<br>
2. Startを押す<br>
3. 音声を聞いてシャドーイング<br>
4. 正しければ次へ進む<br>
5. わからなければ「Again」で繰り返し
</div>

<div class="card">
<textarea id="input" placeholder="Paste English text here"></textarea>

<br>
<label>Speed: <span id="speedVal">0.8</span></label><br>
<input type="range" min="0.5" max="1.2" step="0.1" value="0.8" id="speed">

<br>
<button onclick="start()">Start</button>
<button onclick="forceNext()">Next ▶</button>
</div>

<div class="card">
<div id="target">Press Start</div>
<div id="result"></div>
</div>

</div>

<script>
let chunks=[], index=0;
let recognition;

// ===== 音声（元の安定版）=====
function speak(text){
  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = parseFloat(document.getElementById("speed").value);

  u.onend = ()=>setTimeout(startListening,200);

  speechSynthesis.speak(u);
}

// ===== 以下そのまま =====

document.getElementById("speed").oninput = function(){
  document.getElementById("speedVal").innerText = this.value;
};

function splitText(text){
  return text.replace(/\n/g," ")
    .split(/(?<=[.!?])/)
    .filter(s=>s.trim());
}

function initRecognition(){
  recognition = new webkitSpeechRecognition();
  recognition.lang="en-US";
  recognition.interimResults=true;

  recognition.onresult = function(e){
    let final="";
    for(let i=0;i<e.results.length;i++){
      if(e.results[i].isFinal){
        final += e.results[i][0].transcript;
      }
    }

    if(final){
      document.getElementById("result").innerHTML = final;
      check(final);
    }
  };

  recognition.onerror = ()=>startListening();
}

function startListening(){
  try{ recognition.start(); }catch(e){}
}

function start(){
  chunks = splitText(document.getElementById("input").value);
  index=0;
  initRecognition();
  next();
}

function next(){
  if(index>=chunks.length){
    document.getElementById("target").innerText="Finished!";
    return;
  }

  document.getElementById("target").innerText = chunks[index];
  speak(chunks[index]);
}

function forceNext(){
  index++;
  next();
}

function check(user){
  let target = chunks[index].toLowerCase().split(" ");
  let input = user.toLowerCase().split(" ");

  let match=0;

  target.forEach(w=>{
    if(input.includes(w)) match++;
  });

  if(match/target.length > 0.4){
    index++;
    setTimeout(next,800);
  } else {
    speak("Again");
  }
}
</script>

</body>
</html>
