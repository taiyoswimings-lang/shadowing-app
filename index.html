<!DOCTYPE html>
<html>
<head>
<title>Shadowing Trainer</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f2f2f7;
  margin: 0;
  text-align: center;
}

h1 { font-size: 28px; margin-top: 25px; }
.subtitle { color: #666; margin-bottom: 10px; }

.container {
  max-width: 850px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  margin: 15px 0;
  padding: 18px;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: left;
}

textarea {
  width: 100%;
  height: 120px;
  font-size: 16px;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
}

button {
  padding: 12px 18px;
  margin: 8px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#target { font-size: 22px; margin-bottom: 10px; }
#result { font-size: 18px; margin-top: 5px; }

.guide {
  font-size: 14px;
  color: #444;
  line-height: 1.6;
}
</style>
</head>

<body>

<h1>大洋の特訓用自作アプリ</h1>
<div class="subtitle">Shadowing Trainer</div>

<div class="container">

<div class="card guide">
<b>使い方</b><br>
① 英文を貼り付ける<br>
② Startを押す<br>
③ 音声を聞きながら同時に発話（シャドーイング）<br>
④ 正しければ次へ進む<br>
⑤ 難しければ「Next」でスキップ
</div>

<div class="card">
<textarea id="input"></textarea>

<br>
<label>Speed: <span id="speedVal">0.9</span></label><br>
<input type="range" min="0.6" max="1.2" step="0.1" value="0.9" id="speed">

<br>
<button onclick="start()">Start</button>
<button onclick="forceNext()">Next ▶</button>
</div>

<div class="card">
<div id="target">Press Start</div>
<div id="result"></div>
</div>

</div>

<script>
let chunks=[], index=0;
let recognition;

let bufferText="";
let silenceTimer=null;
let isSpeaking=false;
let selectedVoice=null;

// ===== 音声取得 =====
function loadVoices(){
  let voices = speechSynthesis.getVoices();

  selectedVoice = voices.find(v => v.lang === "en-US" && v.name.includes("Samantha"))
    || voices.find(v => v.lang === "en-US")
    || voices[0];
}
speechSynthesis.onvoiceschanged = loadVoices;

// ===== スピード表示 =====
document.getElementById("speed").oninput = function(){
  document.getElementById("speedVal").innerText = this.value;
};

// ===== 分割（修正版）=====
function splitText(text){

  text = text.replace(/\n/g," ");

  let raw = text.split(/([,.!?])/);
  let result = [];
  let buffer = "";

  for(let i=0;i<raw.length;i+=2){

    let sentence = (raw[i] || "");
    let punct = raw[i+1] || "";

    let combined = sentence + punct;

    // ★コンマ特別処理
    if(punct === ","){
      let nextPart = raw[i+2] || "";
      if(nextPart.trim().length <= 5){
        buffer += " " + combined;
        continue;
      }
    }

    if(combined.trim().length < 20){
      buffer += " " + combined;
    } else {
      if(buffer){
        result.push(buffer.trim());
        buffer="";
      }
      result.push(combined.trim());
    }
  }

  if(buffer) result.push(buffer.trim());

  return result.filter(s => s.length > 5);
}

// ===== 音声認識 =====
function initRecognition(){
  recognition = new webkitSpeechRecognition();
  recognition.lang="en-US";
  recognition.interimResults=true;
  recognition.continuous=true;

  recognition.onresult = function(e){

    let interim="";

    for(let i=e.resultIndex;i<e.results.length;i++){
      let txt = e.results[i][0].transcript;

      if(e.results[i].isFinal){
        bufferText += " " + txt;
      } else {
        interim += txt;
      }
    }

    document.getElementById("result").innerText =
      (bufferText + " " + interim).trim();

    if(isSpeaking) return;

    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(()=>{
      if(bufferText.trim()){
        check(bufferText.trim());
        bufferText="";
      }
    },700); // ★短縮
  };

  recognition.onend = ()=> recognition.start();
}

// ===== 音声 =====
function speak(text){

  speechSynthesis.cancel();

  setTimeout(()=>{

    const u = new SpeechSynthesisUtterance(text);
    u.voice = selectedVoice;
    u.rate = parseFloat(document.getElementById("speed").value);
    u.pitch = 1.05;

    u.onstart = ()=> isSpeaking = true;
    u.onend = ()=> isSpeaking = false;

    speechSynthesis.speak(u);

  },250);
}

// ===== 初回解除 =====
function unlockAudio(){
  return new Promise(resolve=>{
    const dummy = new SpeechSynthesisUtterance(" ");
    dummy.onend = resolve;
    speechSynthesis.speak(dummy);
  });
}

// ===== 開始 =====
async function start(){

  speechSynthesis.cancel();
  await unlockAudio();
  loadVoices();

  chunks = splitText(document.getElementById("input").value);
  index = 0;

  initRecognition();
  recognition.start();

  next();
}

// ===== 次 =====
function next(){
  if(index >= chunks.length){
    document.getElementById("target").innerText = "Finished!";
    return;
  }

  document.getElementById("target").innerText = chunks[index];
  speak(chunks[index]);
}

// ===== スキップ =====
function forceNext(){
  index++;
  next();
}

// ===== 判定 =====
function check(user){

  let target = chunks[index].toLowerCase().split(" ");
  let input = user.toLowerCase().split(" ");

  let match = 0;

  target.forEach(w=>{
    if(input.includes(w)) match++;
  });

  if(match / target.length > 0.4){
    index++;
    setTimeout(next,200);
  } else {
    speak("Again");
  }
}
</script>

</body>
</html>
