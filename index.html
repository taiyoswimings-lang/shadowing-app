<script>
let chunks=[], index=0;
let recognition;

let bufferText = "";
let silenceTimer = null;

document.getElementById("speed").oninput = function(){
  document.getElementById("speedVal").innerText = this.value;
};

function splitText(text){
  return text
    .replace(/\n/g," ")
    .split(/(?<=[.!?])|,| and | but /i)
    .map(s=>s.trim())
    .filter(s=>s.length > 5 && s.length < 120);
}

function speak(text){
  speechSynthesis.cancel();

  setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = parseFloat(document.getElementById("speed").value);
    u.onend = ()=> setTimeout(startListening,200);
    speechSynthesis.speak(u);
  },200);
}

// ★ここを修正（Promise化）
function unlockAudio(){
  return new Promise(resolve=>{
    const dummy = new SpeechSynthesisUtterance(" ");
    dummy.onend = resolve;
    speechSynthesis.speak(dummy);
  });
}

function initRecognition(){
  recognition = new webkitSpeechRecognition();
  recognition.lang="en-US";
  recognition.interimResults=true;
  recognition.continuous=true;

  recognition.onresult = function(e){

    let interim="";

    for(let i=e.resultIndex;i<e.results.length;i++){
      let txt = e.results[i][0].transcript;

      if(e.results[i].isFinal){
        bufferText += " " + txt;
      }else{
        interim += txt;
      }
    }

    document.getElementById("result").innerText =
      (bufferText + " " + interim).trim();

    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(()=>{
      if(bufferText.trim()){
        check(bufferText.trim());
        bufferText = "";
      }
    },1200);
  };

  recognition.onerror = ()=>startListening();
}

function startListening(){
  try{ recognition.start(); }catch(e){}
}

// ★ここを修正（await）
async function start(){

  speechSynthesis.cancel();

  await unlockAudio(); // ←ここが超重要

  chunks = splitText(document.getElementById("input").value);
  index = 0;
  initRecognition();

  next();
}

function next(){
  if(index >= chunks.length){
    document.getElementById("target").innerText = "Finished!";
    return;
  }

  document.getElementById("target").innerText = chunks[index];
  speak(chunks[index]);
}

function forceNext(){
  index++;
  next();
}

function check(user){

  let target = chunks[index].toLowerCase().split(" ");
  let input = user.toLowerCase().split(" ");

  let match = 0;

  target.forEach(w=>{
    if(input.includes(w)) match++;
  });

  if(match / target.length > 0.4){
    index++;
    setTimeout(next,800);
  }else{
    speak("Again");
  }
}
</script>
